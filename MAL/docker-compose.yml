services:
  server:
    build:
      context: ./Server/GreenHouseApi
      dockerfile: Dockerfile
    ports:
      - "5000:8080"
    depends_on:
      - db
    environment:
      - ConnectionStrings__DefaultConnection=Host=db;Port=5432;Database=greenhouse;Username=postgres;Password=postgres

  ml:
    build:
      context: ./ML
      dockerfile: Dockerfile
    ports:
      - "5001:5001"
    depends_on:
      - server

  db:
    image: postgres:latest
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: greenhouse
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
