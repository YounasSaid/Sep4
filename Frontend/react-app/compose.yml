services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.dev
    image: react-app
    ports:
      - "8080:8080"

  react-app:
    build:
      context: .
      dockerfile: Dockerfile.dev
    ports:
      - "5173:5173"
    develop:
      watch:
        - action: sync
          path: .
          target: /app